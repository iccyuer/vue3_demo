<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="http://cdn.staticfile.org/moment.js/2.24.0/moment.js"></script>
    <style>
        body {
            background-color: #f5f9fd;
        }

        .weather {
            border: 1px solid #2889fc;
            border-radius: 4px;
            margin-bottom: 10px;
            padding: 5px;
        }

        .machine_list {
            width: 2200px;
        }

        .machine_item {
            display: inline-block;
            width: 250px;
            height: 220px;
            border: 1px solid #2889fc;
            background: #e9f3fe;
            color: #34495e;
            font-size: 14px;
            padding-left: 10px;
            vertical-align: middle;
            cursor: pointer;
        }

        .machine_item .header {
            text-align: center;
            font-weight: bold;
        }

        .machine_item .unit {
            color: #8d9ea7;
        }

        .circle {
            width: 5px;
            height: 5px;
            display: inline-block;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 5px;
        }

        .offline {
            background-color: #ff6565;
        }

        .online {
            background-color: #17cac7;
        }

        .fault {
            background-color: #8d9ea7;
        }

        .warning {
            background-color: #FFECB3;
        }

        .inline-block {
            display: inline-block;
            width: 48%;
            text-align: center;
        }

        td {
            /* min-width: 100px; */
            height: 50px;
            padding: 10px 10px;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            border-spacing: 10px;
        }

        tr {
            border-top: 1px solid red;
            border-bottom: 1px solid red;
        }

        .toggle_btn {
            position: fixed;
            top: 5px;
            right: 10px;
            background-color: #c7e1fc;
            padding: 2px 5px;
            border-radius: 3px;

        }
    </style>
</head>

<body>
    <div class="weather">

    </div>

    <div class="machine_list" id="machine_list">

        }
    ]

    let renderList = [];
    for (let i = 0; i < maxRow; i++) {
        renderList.push([]);
        for (let j = 0; j < maxCol; j++) {
            renderList[i].push(undefined)
        }
    }

    machine_list_data.map(machine => {
        machine.calc_power_show = (machine.calc_power / 1000000000000).toFixed(2);
        machine.last_hour_calc_power_show = (machine.last_hour_calc_power / 1000000000000).toFixed(2);
        machine.last_24hour_calc_power_show = (machine.last_24hour_calc_power / 1000000000000).toFixed(2);
        machine.last_24over_calc_power_show = (machine.last_24over_calc_power / 1000000000000).toFixed(2);
        if (!machine.last_commit_time || (machine.last_commit_time && moment().subtract({ minutes: 20 }).isAfter(machine.last_commit_time, 'minutes'))) {
            machine.type = 'offline';
        } else {
            if (machine.last_hour_calc_power_show > 50) {
                machine.type = 'online';
            } else {
                machine.type = 'warning';
            }
        }
        renderList[machine.row][machine.col] = machine;
    })
    console.log('renderList', renderList);

    let machine_list = $('.machine_list');

    renderList.map(row => {
        row.map(col => {
            let machine_item = ''
            if (!!col) {
                machine_item = `<div class="machine_item ${col.type}">
                    <div class="header">${col.name}</div>
                    <div>矿机算力: ${col.calc_power_show} <span class="unit">TH/s</span></div>
                    <div>过去1小时算力: ${col.last_hour_calc_power_show} <span class="unit">TH/s</span></div>
                    <div>过去1小时过去拒绝数: ${col.last_hour_refuse} <span class="unit">TH/s</span></div>
                    <div>过去24小时算力: ${col.last_24hour_calc_power_show} <span class="unit">TH/s</span></div>
                    <div>过去24小时过期总算力: ${col.last_24over_calc_power_show} <span class="unit">TH/s</span></div>
                    <div>最近提交Share时间:  ${col.last_commit_time}</div>
                    <div>扩展字段: ${col.extension}</div>
                    <div>房间号: ${col.room}</div>
                </div>`
            } else {
                machine_item = '<div class="machine_item"></div>'
            }
            machine_list.append(machine_item);
        })
    })

    $('.machine_list').on('mouseenter', '.machine_item', function() {
        console.log('this', this);
    })
    $('.machine_list').on('mouseleave', '.machine_item', function() {
        console.log('this', this);
    })

    let tbody = $('#tbody');
    machine_list_data.map(machine => {
        tbody.append(`<tr>
                <td>(${machine.row},${machine.col})</td>
                <td>${machine.name}</td>
                <td>${machine.calc_power}</td>
                <td>${machine.last_hour_calc_power}</td>
                <td>${machine.last_hour_refuse}</td>
                <td>${machine.last_24hour_calc_power}</td>
                <td>${machine.last_24over_calc_power}</td>
                <td>${machine.last_commit_time}</td>
                <td>${machine.extension}</td>
            </tr>`)
    })

    let table = $('#table');
    $('body').on('click', '.toggle_btn', function () {
        if (table.is(':hidden')) {
            table.show()
            machine_list.hide()
        } else {
            table.hide();
            machine_list.show()
        }
    })


    let weather_data = [
        {
            "city": "二连浩特市",

            "today_desc": "今天白天天气阴, 风向南, 风力4, 夜晚天气阴, 风向南, 风力4, 温度7°到23°",

    function renderWeather(weather_data) {
        if (!!weather_data && weather_data.length) {
            let weather_box = $('.weather');
            weather_data.map(weather => {
                weather_box.append(`<div>
                    ${weather.city}: ${weather.now_desc}
                </div>`)
            })
        }
    }

    renderWeather(weather_data);

<script>
    let weather_box = $('.weather');
    clearInterval()
    let time_box = $('.time');
    let timer = setInterval(function() {
        time_box.html(`当前时间: ${moment().format('YYYY-MM-DD HH:mm:ss')}`)
    }, 1000);
    $.ajax({
        url: '/monitor/getWeather?id=513322',
        success: function (data) {
            if (data.code == 0) {
                weather_box.append(`<div>
                    ${data.result.city}: ${data.result.now_desc}
                </div>`)
            }
        },
        error: function (data) {
        },
        type: "get",
        dataType: "json"
    })
    $.ajax({
        url: '/monitor/getWeather?id=152501',
