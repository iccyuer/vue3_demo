        body {
            background-color: #f5f9fd;
        }

        .weather {
            border: 1px solid #2889fc;
            border-radius: 4px;
            margin-bottom: 10px;
            padding: 5px;
        }

        .machine_list {
            width: 2200px;
        }

        .machine_item {
            display: inline-block;
            width: 250px;
            height: 220px;
            border: 1px solid #2889fc;
            background: #e9f3fe;
            color: #34495e;
            font-size: 14px;
            padding-left: 10px;
            vertical-align: middle;
            cursor: pointer;
        }

        .machine_item .header {
            text-align: center;
            font-weight: bold;
        }

        .machine_item .unit {
            color: #8d9ea7;
        }

        .circle {
            width: 5px;
            height: 5px;
            display: inline-block;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 5px;
        }

        .offline {
            background-color: #ff6565;
        }

        .online {
            background-color: #17cac7;
        }

        .fault {
            background-color: #8d9ea7;
        }

        .warning {
            background-color: #FFECB3;
        }

        .inline-block {
            display: inline-block;
            width: 48%;
            text-align: center;
        }

        td {
            /* min-width: 100px; */
            height: 50px;
            padding: 10px 10px;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            border-spacing: 10px;
        }

        tr {
            border-top: 1px solid red;
            border-bottom: 1px solid red;
        }

        .toggle_btn {
            position: fixed;
            top: 5px;
            right: 10px;
            background-color: #c7e1fc;
            padding: 2px 5px;
            border-radius: 3px;

        }

        .fixed_box {
            position: fixed;
            display: inline-block;
            width: 250px;
            height: 220px;
            border: 1px solid #2889fc;
            background: #e9f3fe;
            color: #34495e;
            font-size: 14px;
            padding-left: 10px;
            vertical-align: middle;
            cursor: pointer;
            box-shadow: 0px 0px 6px 0px rgba(0, 0, 0, 0.11);
        }
        .machine_list2{
            width: 800px;
        }
        .machine_item2{
            margin-right: 10px;
            width: 48px;
            height: 48px;
            display: inline-block;
            border: 1px solid #2889fc;
            border-radius: 5px;
            padding: 10px;
        }
    </style>
</head>

            machine.color= '#F56C6C';
        } else {
            if (machine.last_hour_calc_power_show > 50) {

                machine.color= '#67C23A';
            } else {
                machine.type = 'warning';
                machine.color= '#E6A23C';

    $('.machine_list2').on('mouseenter', '.machine_item2', function (event) {
        let row = $(this).attr('data-x');
        let col = $(this).attr('data-y');
        if (!row || !col) return;
        let woeker = renderList[row][col];
        if (!!woeker) {
            let top = event.originalEvent.y + 3;
            let left = event.originalEvent.x;
            let fixed_box = $('.fixed_box');
            if (fixed_box.length > 0) {
                if (fixed_box.css('display') == 'inline-block') return;
                fixed_box.css({top: top + "px", left: left + "px", display: "inline-block"});
            } else {
                fixed_box = $('<div class="fixed_box"></div>');
                fixed_box.css({top: top + "px", left: left + "px", display: "inline-block"});
                $('body').append(fixed_box);
            }
            fixed_box.html('<div class="header">' + woeker.name + '</div>' +
                    '<div>矿机算力: ' + woeker.calc_power_show + '<span class="unit">TH/s</span></div>' +
                    '<div>过去1小时算力: '+ woeker.last_hour_calc_power_show + '<span class="unit">TH/s</span></div>' +

                    '<div>过去24小时算力: ' + woeker.last_24hour_calc_power_show + '<span class="unit">TH/s</span></div>' +

    })

    $('body').on('mouseenter', '.fixed_box', function() {
