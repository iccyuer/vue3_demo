<script>


    function createTbody(list) {
        if (!!list && list.length) {
            let tbody = $('#tbody');
            for (let i = 0; i < list.length; i++) {
                let tr = `<tr>
                    <td><span class="circle"></span>汇总</td>
                    <td>5.08 PH/s</td>
                    <td>4.56 PH/s</td>
                    <td>0.03%</td>
                    <td>${i}</td>
                    <td>6</td>
                </tr>`
                    tbody.append(tr);
            }
        }
    }

    createTbody([1,2,3,4,5])    
</script>
